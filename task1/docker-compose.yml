version: '3.8'

services:
  manager:
    build:
      context: .
      dockerfile: ./manager/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - LISTEN_ADDR=0.0.0.0
      - PORT=8080
      - WORKER_URLS=http://worker-1:8081,http://worker-2:8081
      - REQUEST_TIMEOUT=120
    networks:
      - crackhash-net

  worker-1:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    environment:
      - LISTEN_ADDR=0.0.0.0
      - PORT=8081
      - MANAGER_URL=http://manager:8080
    networks:
      - crackhash-net
  
  worker-2:
    build:
      context: .
      dockerfile: ./worker/Dockerfile
    environment:
      - LISTEN_ADDR=0.0.0.0
      - PORT=8081
      - MANAGER_URL=http://manager:8080
    networks:
      - crackhash-net

networks:
  crackhash-net:
    driver: bridge